<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="app.css">
    <title>bansach.com</title>
</head>

<body>
    <div id="dangnhap">
        <form action="" id="login1">
            <h1 id="form-heading">ĐĂNG NHẬP</h1>
            <div class="form-gruop">
                <input class="namelogin" type="text" placeholder="Tên đăng nhập">
            </div>
            <div class="form-gruop">
                <input class="namelogin" type="password" placeholder="Nhập mật khẩu">
            </div>
            <input type="text" value="VÀO" id="dangnhap3">
            <a href="./dangkitaikhoan.html">Đăng kí tài khoản</a><br>
            <a href="./quenmk.html" id="qmk">Quên mật khẩu</a><br>
            <a href="https://www.facebook.com/" id="dkingoaile1">Đăng nhập bằng FaceBook</a>
            <a href="https://accounts.google.com/signin/v2/usernamerecovery?hl=vi&flowName=GlifWebSignIn&flowEntry=ServiceLogin"
                id="dkingoaile">Đăng nhập bằng google</a>
        </form>
    </div>

</body>
<script>
    // Ép JavaScript phải đợi toàn bộ giao diện HTML tải xong mới chạy
    window.addEventListener('DOMContentLoaded', () => {
        const formLogin = document.getElementById("login1");
        const nutVao = document.getElementById("dangnhap3");

        // Kiểm tra nhanh xem JS có tìm thấy Form và Nút không
        if (!formLogin || !nutVao) {
            console.error("Lỗi: Không tìm thấy form 'login1' hoặc nút 'dangnhap3' trong HTML của bạn!");
            return;
        }

        const oTaiKhoan = formLogin.querySelector('input[type="text"]');
        const oMatKhau = formLogin.querySelector('input[type="password"]');

        // Lắng nghe sự kiện click chuột vào nút "VÀO"
        nutVao.addEventListener("click", function (e) {
            e.preventDefault(); // Chặn tuyệt đối hành động tự reload trang của form

            const userNhap = oTaiKhoan.value.trim();
            const passNhap = oMatKhau.value.trim();

            if (userNhap === "" || passNhap === "") {
                alert("Vui lòng nhập đầy đủ tài khoản và mật khẩu!");
                return;
            }

            // Đọc dữ liệu "file" tài khoản từ localStorage
            let danhSachTK = JSON.parse(localStorage.getItem("fileTaiKhoan")) || [];

            // Tạo sẵn tài khoản admin mẫu nếu bộ nhớ trống
            if (danhSachTK.length === 0) {
                danhSachTK.push({ username: "admin", password: "123" });
                localStorage.setItem("fileTaiKhoan", JSON.stringify(danhSachTK));
            }

            // Kiểm tra xem thông tin nhập vào có trùng khớp không
            const kiemTra = danhSachTK.find(tk => tk.username === userNhap && tk.password === passNhap);

            if (kiemTra) {
                alert("Đăng nhập thành công!");

                // Ghi lịch sử đăng nhập
                const thoiGianHienTai = new Date().toLocaleString("vi-VN");
                let lichSu = JSON.parse(localStorage.getItem("fileLichSu")) || [];
                lichSu.push({
                    username: userNhap,
                    thoiGianDangNhap: thoiGianHienTai
                });
                localStorage.setItem("fileLichSu", JSON.stringify(lichSu));

                // Lưu trạng thái đăng nhập và nhảy sang trangchinh.html
                localStorage.setItem("userHienTai", userNhap);
                window.location.href = "trangchinh.html";
            } else {
                alert("Tài khoản hoặc mật khẩu không chính xác!");
            }
        });

        // Bắt sự kiện phím Enter cho ô mật khẩu
        oMatKhau.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                nutVao.click();
            }
        });
    });
</script>

</html>
